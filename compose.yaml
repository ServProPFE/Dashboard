# ServPro dashboard container (provider/admin back office)

name: servpro-dashboard

services:
  dashboard:
    image: node:22-alpine
    container_name: servpro-dashboard
    working_dir: /workspace
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    volumes:
      - ./:/workspace
    ports:
      - "5174:5174"

